rules:
  forbidden_logs:
    - print
    - console.log
    - System.out.println
  required_fields:
    - request_id
    - user_id
  sensitive_fields:
    - password
    - token
    - api_key

ai:
  enabled: false
  runtime: auto
  model: ""
  timeout_seconds: 180

scan:
  exclude:
    - .git
    - .logpilot
    - node_modules
    - .venv
    - dist
    - build
